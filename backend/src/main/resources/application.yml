spring:
  application:
    name: voting-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cache:
    type: simple

server:
  port: ${PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
